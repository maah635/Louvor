<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Minhas Músicas</title>

    <link rel="stylesheet" href="musicas.css">

</head>
<body>

    <div class="container">

        <h1>Minhas Músicas</h1>

        <div class="topo">

            <input
                type="text"
                id="pesquisa"
                placeholder="Pesquisar música..."
            >

        </div>

        <div class="formulario">

            <input
                type="text"
                id="nome"
                placeholder="Nome da música"
            >

            <input
                type="text"
                id="cantor"
                placeholder="Nome do cantor"
            >

            <button id="salvar">
                Adicionar Música
            </button>

        </div>

        <div id="listaMusicas"></div>

    </div>

    <script src="musicas.js"></script>

</body>
</html>
