<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Biblioteca</title>

    <link rel="stylesheet"
    href="musicas.css">

</head>
<body>

    <button id="menu">
        ☰
    </button>

    <div id="menuLateral">

        <div class="topoMenu">

            <h2>Opções</h2>

            <button id="fechar">
                X
            </button>

        </div>

        <p id="nomeUsuario"></p>

        <a href="dashboard.html">
            Painel Principal
        </a>

        <a href="musicas.html">
            Biblioteca
        </a>

        <a href="pesquisa.html">
            Versículos
        </a>

        <a href="favoritas.html">
            Favoritas
        </a>

        <a href="erro.html">
            Letras Pendentes
        </a>

        <br>
        <br>

        <button id="logout">
            Sair da conta
        </button>

    </div>

    <div class="container">

        <h1>Biblioteca</h1>

        <input
            type="text"
            id="pesquisa"
            placeholder="Pesquisar música..."
        >

        <div class="formulario">

            <input
                type="text"
                id="nome"
                placeholder="Nome da música"
            >

            <input
                type="text"
                id="cantor"
                placeholder="Nome do cantor"
            >

            <textarea
                id="letra"
                placeholder="Cole ou escreva a letra aqui..."
            ></textarea>

            <button id="salvar">
                Adicionar Música
            </button>

        </div>

        <h2>
            Minhas músicas
        </h2>

        <div id="listaMusicas">

            <p>
                Nenhuma música cadastrada.
            </p>

        </div>

    </div>

    <script
        type="module"
        src="musicas.js">
    </script>

</body>
</html>
