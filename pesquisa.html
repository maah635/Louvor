<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pesquisar Bíblia</title>

    <link rel="stylesheet" href="pesquisa.css">

</head>
<body>

    <div class="container">

        <h1>Pesquisar na Bíblia</h1>

        <p>
            Digite um versículo, capítulo, livro ou um trecho da Bíblia.
        </p>

        <textarea
            id="textoBiblico"
            placeholder="Ex.: Salmos 91"
        ></textarea>

        <button id="analisar">
            Analisar Músicas
        </button>

        <div id="resultado">

            <h2>Resultados</h2>

            <div id="listaResultados"></div>

        </div>

    </div>

</body<script type="module" src="pesquisa.js"></script>
</html>
