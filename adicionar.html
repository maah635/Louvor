<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Música</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Adicionar Música</h1>

    <div class="container">

        <input
            type="text"
            id="nome"
            placeholder="Nome da música"
        >

        <br><br>

        <input
            type="text"
            id="cantor"
            placeholder="Nome do cantor"
        >

        <br><br>

        <textarea
            id="letra"
            placeholder="Cole a letra aqui"
        ></textarea>

        <br><br>

        <button id="salvar">
            Salvar Música
        </button>

    </div>

    <script type="module" src="adicionar.js"></script>

</body>
</html>
